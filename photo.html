<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Grid Gallery</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #0f172a; /* Deep dark blue */
            color: #f8fafc;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Grid Logic */
        .gallery-grid {
            display: grid;
            max-width: 1100px;
            margin: 0 auto;
            /* Creates 3 columns on desktop, shifts to 1 on mobile automatically */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Makes every item a perfect square */
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Hover Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay span {
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
        }

        /* Interaction Effects */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Visual Portfolio</h1>
        <p>Curated captures from across the globe</p>
    </header>

    <main class="gallery-grid">
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\Wilderness.jpg" alt="Nature">
            <div class="overlay"><span>Wilderness</span></div>
        </div>
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\structure.jpg" alt="Architecture">
            <div class="overlay"><span>Structure</span></div>
        </div>
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\cyber.jpg" alt="Techno">
            <div class="overlay"><span>Cyber</span></div>
        </div>
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\deepblue.jpg" alt="Ocean">
            <div class="overlay"><span>Deep Blue</span></div>
        </div>
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\urban.jpg" alt="Street">
            <div class="overlay"><span>Urban</span></div>
        </div>
        <div class="gallery-item">
            <img src="C:\Users\Admin\Downloads\Nocturnal.jpg" alt="Night">
            <div class="overlay"><span>Nocturnal</span></div>
        </div>
    </main>

</body>
</html>S
